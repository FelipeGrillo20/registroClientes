<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Clientes Registrados</title>
  <link rel="stylesheet" href="css/clientes.css" />
</head>
<body>
  <header class="page-header">
    <div id="userInfo" class="user-info-bar"></div>
    <div class="header-title-container">
      <h1>📋 Trabajadores Registrados</h1>
      <!-- ✅ NUEVO: Contador de trabajadores al lado del título -->
      <div id="contadorTrabajadores" class="contador-trabajadores" style="display: none;">
        <span class="contador-icon">👥</span>
        <span class="contador-label">Cantidad Trabajadores:</span>
        <span class="contador-numero" id="cantidadTrabajadores">0</span>
      </div>
    </div>
  </header>

  <main class="page-main">
    <!-- Botones de acción -->
    <div class="filter-actions">
      <!-- ✅ MOVIDO AL INICIO: Botón Formulario Registro -->
      <a href="modalidad.html" class="btn-back-form">← Modalidad</a>
      
      <button id="btnClearFilters" class="btn-clear-filters">🔄 Limpiar Filtros</button>
      
      <!-- Filtro de profesional (solo visible para admin) -->
      <div id="profesionalFilterContainer" class="profesional-filter-container" style="display: none;">
        <label for="filterProfesionalSelect" class="filter-label">👤 Profesional:</label>
        <select id="filterProfesionalSelect" class="filter-profesional-select">
          <option value="">Todos los Profesionales</option>
        </select>
      </div>

      <!-- ✅ NUEVO: Badge de nombre para perfil profesional (en lugar del select) -->
      <div id="profesionalBadgeContainer" class="profesional-badge-container" style="display: none;">
        <div class="profesional-badge-card">
          <div class="profesional-badge-avatar" id="profesionalBadgeAvatar">👤</div>
          <div class="profesional-badge-info">
            <span class="profesional-badge-label">Profesional</span>
            <span class="profesional-badge-nombre" id="profesionalBadgeNombre">-</span>
          </div>
          <div class="profesional-badge-dot"></div>
        </div>
      </div>
      
      <!-- Filtro de año (visible para admin Y profesional) -->
      <div id="yearFilterContainer" class="year-filter-container" style="display: none;">
        <label for="filterAño" class="filter-label">📅 Año:</label>
        <select id="filterAño" class="filter-year-select">
          <option value="">Todos los Años</option>
        </select>
      </div>
      
      <!-- Filtro de mes (visible para admin Y profesional) -->
      <div id="mesFilterContainer" class="mes-filter-container" style="display: none;">
        <label for="filterMes" class="filter-label">📆 Mes:</label>
        <select id="filterMes" class="filter-mes-select">
          <option value="">Todos los Meses</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <table class="client-table" id="clientTable" aria-describedby="tabla-clientes">
        <thead>
          <tr>
            <!-- CÉDULA CON FILTRO -->
            <th class="filterable" data-type="cedula">
              <span>Cédula</span>
              <span class="filter-icon" aria-label="Filtrar por cédula" title="Filtrar por cédula">⚙️</span>
              <div class="filter-menu" id="filterMenu-cedula">
                <label for="filterCedula">Buscar por cédula:</label>
                <input type="text" id="filterCedula" placeholder="Ingresa cédula..." />
              </div>
            </th>

            <th>Nombre</th>

            <!-- SEDE CON FILTRO -->
            <th class="filterable" data-type="sede">
              <span>Sede</span>
              <span class="filter-icon" aria-label="Filtrar por sede" title="Filtrar por sede">⚙️</span>
              <div class="filter-menu" id="filterMenu-sede">
                <label for="filterSede">Filtrar por sede:</label>
                <select id="filterSede">
                  <option value="">Todas las Sedes</option>
                </select>
              </div>
            </th>

            <th>Email</th>
            <th>Teléfono</th>

            <!-- VÍNCULO CON FILTRO -->
            <th class="filterable" data-type="vinculo">
              <span>Vínculo</span>
              <span class="filter-icon" aria-label="Filtrar por vínculo" title="Filtrar por vínculo">⚙️</span>
              <div class="filter-menu" id="filterMenu-vinculo">
                <label for="filterVinculo">Filtrar por vínculo:</label>
                <select id="filterVinculo">
                  <option value="">Todos los Vínculos</option>
                  <option value="Trabajador">Trabajador</option>
                  <option value="Familiar Trabajador">Familiar Trabajador</option>
                </select>
              </div>
            </th>

            <!-- EMPRESA USUARIO CON FILTRO -->
            <th class="filterable" data-type="empresa">
              <span>Empresa</span>
              <span class="filter-icon" aria-label="Filtrar por empresa" title="Filtrar por empresa">⚙️</span>
              <div class="filter-menu" id="filterMenu-empresa">
                <label for="filterEmpresa">Filtrar por empresa:</label>
                <select id="filterEmpresa">
                  <option value="">Todas las Empresas</option>
                </select>
              </div>
            </th>

            <th>Acciones</th>
          </tr>
        </thead>

        <tbody id="clientList">
          <!-- Filas generadas dinámicamente -->
        </tbody>
      </table>
    </div>

    <!-- Mensaje inicial cuando no hay clientes -->
    <p id="noFilterMessage" class="no-filter-message">
      🔍 Usa los filtros para ver los clientes registrados.
    </p>
  </main>

  <!-- ✅ Scripts en el orden correcto -->
  <script src="js/config.js"></script>
  <script src="js/auth-check.js"></script>
  <!-- ✅ NUEVO: Scripts de generación de informes (se cargarán dinámicamente cuando se necesiten) -->
  <script src="js/clientes.js"></script>
</body>
</html>
