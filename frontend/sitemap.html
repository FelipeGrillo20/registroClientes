<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa de Sitio</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/sitemap.css" />
</head>
<body>

  <div class="sitemap-container">
    <!-- Barra de usuario -->
    <div id="userInfo" class="user-info-bar" style="display: none;"></div>
    
    <h1>🗺️ Mapa de Sitio</h1>
    <p class="sitemap-subtitle">Navegación completa del sistema</p>

    <!-- Rueda de navegación -->
    <div class="wheel-container">
      <div class="wheel-center">
        <div class="center-icon">🏢</div>
        <div class="center-text">Sistema<br>Trabajadores</div>
      </div>

      <!-- Item 1: Informe Empresas -->
      <div class="wheel-item" data-position="1" data-url="informe-empresas.html">
        <div class="wheel-item-content">
          <div class="item-icon">📋</div>
          <div class="item-text">Informe<br>Empresas</div>
        </div>
      </div>

      <!-- Item 2: Orden de Servicio -->
      <div class="wheel-item modalidad-orden-servicio" data-position="2" data-url="creditos.html">
        <div class="wheel-item-content">
          <div class="item-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32" fill="none">
              <rect x="10" y="6" width="38" height="50" rx="5" ry="5" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2.5"/>
              <rect x="10" y="6" width="38" height="12" rx="5" ry="5" fill="rgba(255,255,255,0.4)"/>
              <line x1="18" y1="28" x2="46" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="18" y1="36" x2="46" y2="36" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <line x1="18" y1="44" x2="34" y2="44" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
              <circle cx="49" cy="49" r="10" fill="rgba(255,255,255,0.9)"/>
              <text x="49" y="53.5" text-anchor="middle" font-size="13" font-weight="bold" fill="#e67e22">✓</text>
            </svg>
          </div>
          <div class="item-text">Orden de<br>Servicio</div>
        </div>
      </div>

      <!-- Item 4: Agendamiento -->
      <div class="wheel-item modalidad-agendamiento" data-position="4" data-url="agendamiento.html">
        <div class="wheel-item-content">
          <div class="item-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32" fill="none">
              <rect x="8" y="14" width="48" height="42" rx="5" ry="5" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2.5"/>
              <rect x="8" y="14" width="48" height="13" rx="4" ry="4" fill="rgba(255,255,255,0.4)"/>
              <line x1="20" y1="8" x2="20" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
              <line x1="44" y1="8" x2="44" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
              <line x1="8" y1="27" x2="56" y2="27" stroke="white" stroke-width="1.5" stroke-dasharray="3,2"/>
              <rect x="14" y="32" width="8" height="7" rx="2" fill="rgba(255,255,255,0.5)"/>
              <rect x="28" y="32" width="8" height="7" rx="2" fill="rgba(255,255,255,0.85)"/>
              <rect x="42" y="32" width="8" height="7" rx="2" fill="rgba(255,255,255,0.5)"/>
              <rect x="14" y="43" width="8" height="7" rx="2" fill="rgba(255,255,255,0.5)"/>
              <rect x="28" y="43" width="8" height="7" rx="2" fill="rgba(255,255,255,0.5)"/>
              <rect x="42" y="43" width="8" height="7" rx="2" fill="rgba(255,255,255,0.3)"/>
            </svg>
          </div>
          <div class="item-text">Agendamiento</div>
        </div>
      </div>

      <!-- Item 7: Trazabilidad de Pagos -->
      <div class="wheel-item" data-position="7" data-url="trazabilidad.html">
        <div class="wheel-item-content">
          <div class="item-icon">💰</div>
          <div class="item-text">Trazabilidad<br>de Pagos</div>
        </div>
      </div>

      <!-- Item 8: Dashboard SVE -->
      <div class="wheel-item" data-position="8" data-url="dashboardSVE.html">
        <div class="wheel-item-content">
          <div class="item-icon">📊</div>
          <div class="item-text">Dashboard<br>SVE</div>
        </div>
      </div>

      <!-- Item 10: Dashboard Orientación Psicosocial -->
      <div class="wheel-item modalidad-psicosocial" data-position="10" data-url="dashboard.html">
        <div class="wheel-item-content">
          <div class="item-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="34" height="34" fill="none">
              <!-- Cabeza -->
              <circle cx="32" cy="11" r="8" fill="rgba(255,255,255,0.9)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
              <!-- Cuello / hombros — une cabeza con cuerpo -->
              <path d="M22 44 C22 32 42 32 42 44" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
              <!-- Corazón pegado al cuerpo -->
              <path d="M32 57 C32 57 22 50 22 44 C22 40 25 37.5 28.5 37.5 C30.2 37.5 32 38.8 32 38.8 C32 38.8 33.8 37.5 35.5 37.5 C39 37.5 42 40 42 44 C42 50 32 57 32 57Z" fill="white" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
              <!-- Brillo corazón -->
              <path d="M26 42 C26 41 27.8 40 29.5 41" fill="none" stroke="rgba(180,120,210,0.75)" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="item-text">Dashboard<br>Orient. Psico.</div>
        </div>
      </div>

      <!-- Item 11: Dashboard Entrega de Resultados (NUEVO) -->
      <div class="wheel-item modalidad-entrega" data-position="11" data-url="dashboard-entrega.html">
        <div class="wheel-item-content">
          <div class="item-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32" fill="none">
              <!-- Documento base -->
              <rect x="9" y="7" width="35" height="44" rx="5" ry="5" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2.2"/>
              <!-- Encabezado documento -->
              <rect x="9" y="7" width="35" height="11" rx="5" ry="5" fill="rgba(255,255,255,0.4)"/>
              <!-- Líneas de contenido -->
              <line x1="16" y1="27" x2="37" y2="27" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <line x1="16" y1="34" x2="37" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <line x1="16" y1="41" x2="27" y2="41" stroke="white" stroke-width="2" stroke-linecap="round"/>
              <!-- Círculo de entrega con check -->
              <circle cx="47" cy="47" r="13" fill="rgba(255,255,255,0.92)" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
              <!-- Check / visto bueno -->
              <polyline points="40,47 45,53 55,38" fill="none" stroke="#1a7f64" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="item-text">Dashboard<br>Entrega Result.</div>
        </div>
      </div>

    </div>

    <div class="sitemap-footer">
      <p>Haz clic en cualquier sección para navegar</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth-check.js"></script>
  <script src="js/sitemap.js"></script>
</body>
</html>
